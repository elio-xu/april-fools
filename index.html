<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>愚人节特别企划</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px 50px;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
  }

  .header h1 {
    font-size: 26px;
    color: #fff;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
  }

  .header p {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 1px;
  }

  .progress {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.4);
    margin-bottom: 20px;
    transition: all 0.3s;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    max-width: 360px;
    width: 100%;
  }

  .card-container {
    perspective: 800px;
    height: 160px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .card.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card-front {
    background: linear-gradient(145deg, #e74c3c, #c0392b);
    box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
    border: 2px solid rgba(255, 255, 255, 0.15);
  }

  .card-front .icon {
    font-size: 36px;
    margin-bottom: 8px;
    animation: shake 2s ease-in-out infinite;
  }

  .card-front .label {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
  }

  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    10%, 30% { transform: rotate(-5deg); }
    20%, 40% { transform: rotate(5deg); }
    50% { transform: rotate(0deg); }
  }

  .card-back {
    background: linear-gradient(145deg, #fff5f5, #ffe0e6);
    transform: rotateY(180deg);
    box-shadow: 0 4px 20px rgba(255, 107, 158, 0.3);
    border: 2px solid rgba(255, 107, 158, 0.2);
  }

  .card-back .sweet-icon {
    font-size: 28px;
    margin-bottom: 10px;
  }

  .card-back .sweet-text {
    color: #c0392b;
    font-size: 14px;
    line-height: 1.6;
    text-align: center;
    font-weight: 500;
  }

  /* Easter egg overlay */
  .easter-egg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    padding: 30px;
  }

  .easter-egg.show {
    opacity: 1;
    pointer-events: auto;
  }

  .easter-egg .final-text {
    color: #fff;
    font-size: 22px;
    line-height: 1.8;
    text-align: center;
    max-width: 300px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease 0.5s;
  }

  .easter-egg.show .final-text {
    opacity: 1;
    transform: translateY(0);
  }

  .easter-egg .sub-text {
    color: rgba(255, 255, 255, 0.5);
    font-size: 13px;
    margin-top: 24px;
    opacity: 0;
    transition: opacity 0.8s ease 1.5s;
  }

  .easter-egg.show .sub-text {
    opacity: 1;
  }

  /* Hearts animation */
  .heart {
    position: fixed;
    z-index: 99;
    font-size: 20px;
    pointer-events: none;
    animation: floatUp 4s ease-out forwards;
    opacity: 0;
  }

  @keyframes floatUp {
    0% {
      opacity: 1;
      transform: translateY(0) scale(0.5) rotate(0deg);
    }
    50% {
      opacity: 1;
      transform: translateY(-40vh) scale(1) rotate(15deg);
    }
    100% {
      opacity: 0;
      transform: translateY(-80vh) scale(0.8) rotate(-10deg);
    }
  }

  /* Card entrance animation */
  .card-container {
    opacity: 0;
    transform: translateY(20px);
    animation: cardIn 0.4s ease forwards;
  }
  .card-container:nth-child(1) { animation-delay: 0.1s; }
  .card-container:nth-child(2) { animation-delay: 0.2s; }
  .card-container:nth-child(3) { animation-delay: 0.3s; }
  .card-container:nth-child(4) { animation-delay: 0.4s; }
  .card-container:nth-child(5) { animation-delay: 0.5s; }
  .card-container:nth-child(6) { animation-delay: 0.6s; }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Subtle pulse on unflipped cards */
  .card:not(.flipped) {
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎭 愚人节特别企划</h1>
  <p>据说只有胆大的人才敢全部翻开</p>
</div>

<div class="progress" id="progress">已翻开 0 / 6</div>

<div class="grid" id="grid"></div>

<div class="easter-egg" id="easterEgg">
  <div class="final-text">
    今天全世界都在说假话<br>
    但这里每一句<br>
    都是真的 ❤️
  </div>
  <div class="sub-text">— 你的专属愚人节 · 2026 —</div>
</div>

<script>
const cards = [
  {
    icon: '⚠️',
    label: '高 能 预 警',
    sweetIcon: '☀️',
    sweetText: '你笑起来的样子\n是我见过最好看的风景'
  },
  {
    icon: '🐛',
    label: '有 虫 ！',
    sweetIcon: '💌',
    sweetText: '今日愚人节新闻：\n有人爱你这件事，不是假的'
  },
  {
    icon: '👻',
    label: '胆 小 勿 点',
    sweetIcon: '🌙',
    sweetText: '全世界都可以骗你\n但我的心不会'
  },
  {
    icon: '☠️',
    label: '前 方 危 险',
    sweetIcon: '🎁',
    sweetText: '遇见你之后\n每一天都像中了奖'
  },
  {
    icon: '💣',
    label: '后 果 自 负',
    sweetIcon: '🌈',
    sweetText: '你是我唯一\n不想开的玩笑'
  },
  {
    icon: '😱',
    label: '最 恐 怖 的',
    sweetIcon: '🐶',
    sweetText: '骗你是小狗——\n我想和你走完这一生'
  }
];

let flippedCount = 0;
const grid = document.getElementById('grid');
const progress = document.getElementById('progress');

cards.forEach((data, i) => {
  const container = document.createElement('div');
  container.className = 'card-container';

  container.innerHTML = `
    <div class="card" data-index="${i}">
      <div class="card-face card-front">
        <span class="icon">${data.icon}</span>
        <span class="label">${data.label}</span>
      </div>
      <div class="card-face card-back">
        <span class="sweet-icon">${data.sweetIcon}</span>
        <span class="sweet-text">${data.sweetText.replace(/\n/g, '<br>')}</span>
      </div>
    </div>
  `;

  container.addEventListener('click', () => {
    const card = container.querySelector('.card');
    if (card.classList.contains('flipped')) return;

    card.classList.add('flipped');
    flippedCount++;
    progress.textContent = `已翻开 ${flippedCount} / 6`;

    // Vibrate on mobile if supported
    if (navigator.vibrate) navigator.vibrate(30);

    if (flippedCount === cards.length) {
      setTimeout(() => {
        showEasterEgg();
      }, 800);
    }
  });

  grid.appendChild(container);
});

function showEasterEgg() {
  document.getElementById('easterEgg').classList.add('show');
  spawnHearts();
}

function spawnHearts() {
  const emojis = ['❤️', '💕', '💗', '💖', '💓', '🩷', '✨'];
  let count = 0;
  const interval = setInterval(() => {
    if (count > 30) { clearInterval(interval); return; }
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.bottom = '-20px';
    heart.style.fontSize = (16 + Math.random() * 20) + 'px';
    heart.style.animationDuration = (3 + Math.random() * 2) + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
    count++;
  }, 150);
}
</script>

</body>
</html>
